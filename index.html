<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111111">
    <title>Skill Tree App</title>
    
    <style>
        :root {
            --bg: #111;
            --card-bg: #1a1a1a;
            --text: #eee;
            --subtext: #888;
            
            --theme-left: #ff7043; 
            --theme-right: #f06292;
            
            --unlocked-accent: #00e676;
            --line-color: #555;
        }

        /* --- APP LAYOUT --- */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow: hidden; /* Prevents the whole page from bouncing on mobile */
            display: flex;
            flex-direction: column;
            height: 100dvh; /* Dynamic Viewport Height for mobile browsers */
        }

        /* --- HEADER (Sticky at the top) --- */
        .app-header {
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            text-align: center;
            z-index: 100;
            border-bottom: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }

        select {
            background: #222; color: #fff; font-size: 1.2rem; padding: 8px 15px;
            border: 2px solid #444; border-radius: 8px; cursor: pointer; outline: none;
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
            width: 100%; max-width: 300px;
        }
        
        .subtitle { color: #888; margin: 8px 0 0 0; font-size: 0.8rem; }

        /* --- THE VIEWPORT (The Pannable Map Area) --- */
        .tree-viewport {
            flex-grow: 1;
            overflow: auto;
            -webkit-overflow-scrolling: touch; /* Smooth momentum scrolling on iOS */
            padding: 40px;
            position: relative;
            /* Grid trick to allow content to center itself if smaller than screen */
            display: grid;
            place-items: end center; 
        }

        /* Hide scrollbars for a cleaner app look */
        .tree-viewport::-webkit-scrollbar { display: none; }
        .tree-viewport { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- THE FOREST --- */
        .forest {
            display: flex; gap: 80px; align-items: flex-end; position: relative;
            padding: 40px 20px 80px 20px; 
            margin: auto;
        }

        /* --- COLUMNS --- */
        .tree-column { display: flex; flex-direction: column-reverse; align-items: center; position: relative; }

        /* --- LAYOUT: CONVERGE (Right Tree) --- */
        .tier1-mid-node { margin-bottom: 40px; position: relative; }
        .tier1-mid-node::before { content: ''; position: absolute; bottom: -42px; left: 50%; transform: translateX(-50%); width: 4px; height: 42px; background: var(--line-color); z-index: 0; }
        .foundation-row { display: flex; gap: 30px; position: relative; justify-content: center; }
        .foundation-connector { position: absolute; top: -20px; left: 130px; right: 130px; height: 4px; background: var(--line-color); z-index: 0; }
        .foundation-row .node-card::before { content: ''; position: absolute; top: -22px; left: 50%; transform: translateX(-50%); width: 4px; height: 22px; background: var(--line-color); }

        /* --- LAYOUT: PARALLEL (Left Tree) --- */
        .parallel-row { display: flex; gap: 30px; align-items: stretch; position: relative; }
        .parallel-col { display: flex; flex-direction: column-reverse; align-items: center; flex: 1; }
        
        .col-filler-line { width: 4px; flex-grow: 1; background: var(--line-color); position: relative; margin-bottom: 0px; z-index: -1; min-height: 20px; }
        .col-filler-line::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 0; transition: height 0.4s ease-out; }
        .col-filler-line.active-easy::after { height: calc(100% + 40px); background: #00e676; box-shadow: 0 0 10px #00e676; }
        .col-filler-line.active-hard::after { height: calc(100% + 40px); background: #ff5252; box-shadow: 0 0 10px #ff5252; }
        .col-filler-line.active-med::after { height: calc(100% + 80px); background: #ffb300; box-shadow: 0 0 10px #ffb300; z-index: 3;}

        /* Note: Left/Right coordinates adjusted for 30px gap */
        .parallel-collector { position: absolute; top: -40px; left: 145px; right: 145px; height: 4px; background: var(--line-color); z-index: -2; }
        .parallel-collector::before { content: ''; position: absolute; top: 4px; left: 0; width: 4px; height: 36px; background: var(--line-color); }
        .parallel-collector::after { content: ''; position: absolute; top: 4px; right: 0; width: 4px; height: 36px; background: var(--line-color); }
        .center-stem-up { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 40px; background: var(--line-color); }

        .route-left { position: absolute; top: 0; left: 0; height: 4px; width: 0; transition: width 0.4s ease-out; }
        .active-left .route-left { width: 50%; background: #00e676; box-shadow: 0 0 10px #00e676; transition-delay: 0.4s; z-index: 1;}
        .route-right { position: absolute; top: 0; right: 0; height: 4px; width: 0; transition: width 0.4s ease-out; }
        .active-right .route-right { width: 50%; background: #ff5252; box-shadow: 0 0 10px #ff5252; transition-delay: 0.4s; z-index: 1;}
        .route-left-up, .route-right-up { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 0; transition: height 0.4s ease-out; z-index: 2;}
        .route-left-up { background: #00e676; box-shadow: 0 0 10px #00e676; }
        .active-left .route-left-up { height: 40px; transition-delay: 0.8s; }
        .route-right-up { background: #ff5252; box-shadow: 0 0 10px #ff5252; }
        .active-right .route-right-up { height: 40px; transition-delay: 0.8s; }

        /* --- TIER 2 & TIER 3 --- */
        .tier-2-area { display: flex; flex-direction: column-reverse; align-items: center; opacity: 0.1; filter: grayscale(100%); transition: all 1s ease; margin-bottom: 80px; width: 100%; position: relative; }
        .tier-2-area.unlocked { opacity: 1; filter: grayscale(0%); }

        .tier-3-area { display: flex; flex-direction: column-reverse; align-items: center; opacity: 0.1; filter: grayscale(100%); transition: all 1s ease; margin-bottom: 80px; width: 100%; position: relative; }
        .tier-3-area.unlocked { opacity: 1; filter: grayscale(0%); }

        .tier3-collector { position: absolute; bottom: -40px; left: calc(50% - 145px); width: 145px; height: 4px; background: var(--line-color); z-index: -2; }
        .tier3-collector::before { content:''; position:absolute; top:4px; left:0; width:4px; height:36px; background: var(--line-color); }
        .tier3-collector::after { content:''; position:absolute; bottom:4px; right:0; width:4px; height:36px; background: var(--line-color); }
        .t3-route-up1 { position: absolute; top: 4px; left: 0; width: 4px; height: 36px; background: var(--unlocked-accent); box-shadow: 0 0 10px var(--unlocked-accent); transform-origin: bottom; transform: scaleY(0); transition: transform 0.4s linear; }
        .active-t3 .t3-route-up1 { transform: scaleY(1); }
        .t3-route-across { position: absolute; top: 0; left: 0; height: 4px; width: 145px; background: var(--unlocked-accent); box-shadow: 0 0 10px var(--unlocked-accent); transform-origin: left; transform: scaleX(0); transition: transform 0.4s linear; transition-delay: 0.4s; }
        .active-t3 .t3-route-across { transform: scaleX(1); }
        .t3-route-up2 { position: absolute; bottom: 4px; right: 0; width: 4px; height: 36px; background: var(--unlocked-accent); box-shadow: 0 0 10px var(--unlocked-accent); transform-origin: bottom; transform: scaleY(0); transition: transform 0.4s linear; transition-delay: 0.8s; }
        .active-t3 .t3-route-up2 { transform: scaleY(1); }

        /* --- CARDS --- */
        .node-card {
            background: var(--card-bg); 
            width: 260px; /* Kept standard width for readability */
            padding: 15px; border-radius: 8px; 
            border: 1px solid #333; position: relative; z-index: 2; margin-bottom: 25px;
            transition: transform 0.2s ease;
        }
        /* Mobile Active state (replaces hover on touch devices) */
        .node-card:active { transform: scale(0.98); }
        
        .boss-card, .gateway-card { border-width: 2px !important; }

        .theme-left { border-color: var(--theme-left); box-shadow: 0 4px 0 var(--theme-left); }
        .theme-left .title { color: var(--theme-left); }
        .theme-right { border-color: var(--theme-right); box-shadow: 0 4px 0 var(--theme-right); }
        .theme-right .title { color: var(--theme-right); }

        .theme-easy { border-color: #00e676; box-shadow: 0 4px 0 #00b25c; }
        .theme-easy .title { color: #00e676; }
        .theme-med { border-color: #ffb300; box-shadow: 0 4px 0 #c68c00; }
        .theme-med .title { color: #ffb300; }
        .theme-hard { border-color: #ff5252; box-shadow: 0 4px 0 #c8102e; }
        .theme-hard .title { color: #ff5252; }

        .title { font-weight: bold; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 15px; text-align: center; }

        /* --- BOSS PULSING ANIMATIONS --- */
        .unlocked-boss.theme-easy { animation: pulse-easy 2s infinite; }
        .unlocked-boss.theme-med { animation: pulse-med 2s infinite; }
        .unlocked-boss.theme-hard { animation: pulse-hard 2s infinite; }
        .unlocked-boss.theme-right { animation: pulse-right 2s infinite; }
        .unlocked-boss.theme-left { animation: pulse-left 2s infinite; }

        @keyframes pulse-easy { 0% { box-shadow: 0 0 5px rgba(0,230,118,0.2); } 50% { box-shadow: 0 0 20px rgba(0,230,118,0.7); } 100% { box-shadow: 0 0 5px rgba(0,230,118,0.2); } }
        @keyframes pulse-med { 0% { box-shadow: 0 0 5px rgba(255,179,0,0.2); } 50% { box-shadow: 0 0 20px rgba(255,179,0,0.7); } 100% { box-shadow: 0 0 5px rgba(255,179,0,0.2); } }
        @keyframes pulse-hard { 0% { box-shadow: 0 0 5px rgba(255,82,82,0.2); } 50% { box-shadow: 0 0 20px rgba(255,82,82,0.7); } 100% { box-shadow: 0 0 5px rgba(255,82,82,0.2); } }
        @keyframes pulse-right { 0% { box-shadow: 0 0 5px rgba(240,98,146,0.2); } 50% { box-shadow: 0 0 20px rgba(240,98,146,0.7); } 100% { box-shadow: 0 0 5px rgba(240,98,146,0.2); } }
        @keyframes pulse-left { 0% { box-shadow: 0 0 5px rgba(255,112,67,0.2); } 50% { box-shadow: 0 0 20px rgba(255,112,67,0.7); } 100% { box-shadow: 0 0 5px rgba(255,112,67,0.2); } }

        .theme-right .boss-card::before { content: ''; position: absolute; width: 4px; left: 50%; transform: translateX(-50%); bottom: 100%; height: 80px; background: var(--line-color); z-index: -2; }
        .theme-right .unlocked-boss::after { content: ''; position: absolute; width: 4px; left: 50%; transform: translateX(-50%); bottom: 100%; height: 80px; background: var(--theme-right); box-shadow: 0 0 10px var(--theme-right); z-index: -1; transition: height 0.4s ease-out; }
        .node-card.vertical-connect::after { content: ''; position: absolute; width: 4px; height: 26px; background: var(--line-color); left: 50%; transform: translateX(-50%); bottom: -28px; z-index: -1; }

        .branch-container { display: flex; gap: 30px; position: relative; padding-bottom: 30px; }
        .branch-container::before { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 30px; background: var(--line-color); }
        .branch-bar { position: absolute; bottom: 30px; left: 145px; right: 145px; height: 4px; background: var(--line-color); }
        .branch-stem { position: absolute; bottom: 30px; width: 4px; height: 20px; background: var(--line-color); }

        /* --- INPUTS & ICONS --- */
        .skill-group { margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .skill-group:last-child { border-bottom: none; }
        .skill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .skill-name-wrapper { display: flex; align-items: center; gap: 8px; }
        .skill-name { font-weight: bold; color: #ccc; font-size: 0.9rem; }
        
        /* Larger tap target for mobile icons */
        .guide-icon { cursor: pointer; font-size: 1.1rem; filter: grayscale(100%); padding: 5px; margin: -5px; transition: all 0.2s; }
        .guide-icon:active { transform: scale(1.2); filter: grayscale(0%); }
        .skill-desc { font-size: 0.75rem; color: var(--subtext); line-height: 1.3; font-style: italic; display: block; padding-left: 2px;}

        /* Larger tap targets for checkboxes */
        .skill-header input { accent-color: var(--unlocked-accent); cursor: pointer; width: 22px; height: 22px; }
        .counter-btn { background: #333; color: #fff; border: 1px solid #555; padding: 6px 12px; border-radius:6px; cursor: pointer; font-size: 0.9rem; font-weight:bold; }
        .counter-btn.done { background: var(--unlocked-accent); border-color: var(--unlocked-accent); color: #000; }

        /* Mobile FAB (Floating Action Button) for Reset */
        .reset-btn { 
            position: fixed; bottom: 20px; right: 20px; 
            background: rgba(0,0,0,0.8); color: #888; 
            border: 2px solid #333; border-radius: 50%; 
            width: 50px; height: 50px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 100; font-size: 1.2rem; backdrop-filter: blur(5px);
        }

        /* --- MODAL (POPUP) --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: flex-end; /* Bottom sheet on mobile */
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #222; border-top: 4px solid var(--theme-left); border-radius: 20px 20px 0 0;
            padding: 30px; width: 100%; max-height: 80vh; overflow-y: auto; color: #eee;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5); position: relative; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-title { font-size: 1.4rem; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; text-transform: uppercase;}
        .modal-body { line-height: 1.6; font-size: 0.95rem; color: #ccc; padding-bottom: 20px;}
        .modal-body ol { padding-left: 20px; }
        .modal-body li { margin-bottom: 12px; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #888; }

    </style>
</head>
<body>

    <div class="app-header">
        <select id="projectSelect" onchange="switchProject()">
            <option value="kitchen">🔪 Kitchen RPG</option>
            <option value="crochet">🧶 Yarn Mastery</option>
        </select>
        <p class="subtitle">Swipe to explore the Tree</p>
    </div>

    <div class="tree-viewport" id="viewport">
        <div class="forest" id="forest-container">
            </div>
    </div>

    <button class="reset-btn" onclick="resetData()" title="Reset Progress">↻</button>

    <div class="modal-overlay" id="guideModal" onclick="closeGuide(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeGuide()">&times;</span>
            <h2 class="modal-title" id="modalTitle">Skill Guide</h2>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        const projectLibrary = {
            kitchen: {
                colors: { left: '#ff7043', right: '#f06292' },
                leftTree: {
                    tier1: {
                        layout: 'parallel',
                        paths: [
                            {
                                theme: 'theme-easy',
                                nodes: [
                                    { id: "c_prep", title: "Prep Cook", skills: [{ name: "Knife Skills", desc: "Dice onion, mince garlic", instructions: `<strong>How to carefully dice an onion:</strong><ol><li><strong>Cut the stem:</strong> Slice off the stem end of the onion, but leave the hairy root intact.</li><li><strong>Halve it:</strong> Rest the flat side on the board and cut in half straight down through the root.</li><li><strong>Peel:</strong> Peel back the papery skin from both halves.</li><li><strong>Horizontal cuts:</strong> Lay a half flat. Keep your knife parallel to the board and make 2-3 cuts toward the root.</li><li><strong>Vertical cuts:</strong> Make vertical cuts down toward the board, from root to stem.</li><li><strong>The Chop:</strong> Cut across your vertical lines to create perfect squares.</li></ol>`}, { name: "Mise en Place", desc: "Organize ingredients" }] },
                                    { id: "c_boss1", title: "BOSS: Perfect Salad", skills: [{name:"Vinaigrette & Cuts", desc:"Uniform veg with basic dressing"}], isBoss: true }
                                ]
                            },
                            {
                                theme: 'theme-med',
                                nodes: [
                                    { id: "c_line", title: "Line Cook", skills: [{ name: "Heat Control", desc: "Water drop test", instructions: `<strong>The Leidenfrost Effect (Water Drop Test):</strong><br><br>To prevent food from sticking to a stainless steel pan, you must heat it properly before adding oil.<ol><li>Put your dry pan on medium heat for 2-3 minutes.</li><li>Flick a tiny drop of water into the pan.</li><li>If the water just sits there and bubbles, it's <strong>too cold</strong>.</li><li>If the water splatters and vanishes instantly, it's <strong>too hot</strong>.</li><li>If the water forms a perfect bead and slides around the pan like mercury, it is <strong>perfect</strong>. Wipe out the water, add your oil, and start cooking!</li></ol>`}, { name: "Fat Mgmt", desc: "Butter vs Oil smoke points" }] },
                                    { id: "c_boss2", title: "BOSS: The Omelette", skills: [{name:"French Omelette", desc:"Pale yellow cigar roll"}], isBoss: true }
                                ]
                            },
                            {
                                theme: 'theme-hard',
                                nodes: [
                                    { id: "c_pantry", title: "Pantry Chef", skills: [{ name: "Emulsions", desc: "Mayo & Vinaigrettes", instructions: `<strong>The Secret to Stable Emulsions:</strong><br><br>An emulsion is forcing two liquids that hate each other (like oil and vinegar) to hold hands. If you rush, they break.<ol><li><strong>The Anchor:</strong> You need an emulsifier to bind them. Egg yolks (for mayo) or Dijon mustard work perfectly.</li><li><strong>The Drip:</strong> Whisk your acid and emulsifier together first. Then, add your oil literally <em>drop by drop</em> while whisking furiously.</li><li><strong>The Stream:</strong> Once it starts to thicken, you can increase the oil to a very slow stream. Never stop whisking!</li></ol>`}, { name: "Quick Pickles", desc: "Brine ratios & Balance" }] },
                                    { id: "c_boss3", title: "BOSS: Hollandaise", skills: [{name:"Classic Hollandaise", desc:"Temper egg yolks, emulsify butter"}], isBoss: true }
                                ]
                            }
                        ]
                    },
                    tier2: {
                        branches: [
                            { id: "c_side", title: "Side Dishes", isGateway: true, skills: [{name:"Rice Pilaf", desc:"Fluff with fork"}, {name:"Gratin", desc:"Cream reduction"}] },
                            { id: "c_tool", title: "Equipment", skills: [{name:"Cast Iron", desc:"Seasoning"}, {name:"Sharpening", desc:"Whetstone"}] }
                        ]
                    },
                    tier3: {
                        requires: "c_side",
                        branches: [
                            { id: "c_starch", title: "Starch Mastery", skills: [{name: "Perfect Risotto", desc: "Constant agitation"}, {name: "Potato Gnocchi", desc: "Light pillows"}] },
                            { id: "c_veg", title: "Vegetable Mastery", skills: [{name: "Root Purée", desc: "Silky smooth"}, {name: "Glazing", desc: "Butter/sugar emulsion"}] }
                        ]
                    }
                },
                rightTree: {
                    tier1: {
                        layout: 'converge',
                        roots: [
                            { id: "p1", title: "Home Baker", skills: [{name:"Weighing", desc:"Digital scale usage"}, {name:"Cookies", desc:"Creaming method"}] },
                            { id: "p2", title: "Patissier", skills: [{name:"Choux Pastry", desc:"Pipe eclairs"}, {name:"Custards", desc:"Temper eggs"}] }
                        ],
                        middle: { id: "p_mid", title: "Dough Station", skills: [{name:"Kneading", desc:"Windowpane test"}, {name:"Proofing", desc:"Poke test"}, {name:"Shaping", desc:"Surface tension"}] },
                        boss: { id: "p_boss", title: "BOSS: Fruit Tart", skills: [{name:"Fruit Tart", desc:"Blind bake + Cream"}], isBoss: true }
                    },
                    tier2: {
                        branches: [
                            { id: "p_bread", title: "Boulangerie", skills: [{name:"Sourdough", desc:"Starter maint."}, {name:"Bagels", desc:"Boil & Bake"}] },
                            { id: "p_cake", title: "Patisserie", skills: [{name:"Sponge", desc:"Genoise"}, {name:"Buttercream", desc:"Italian Meringue"}] }
                        ]
                    }
                }
            },
            crochet: {
                colors: { left: '#4db6ac', right: '#7986cb' }, 
                leftTree: {
                    tier1: {
                        layout: 'converge',
                        roots: [
                            { id: "hk1", title: "Materials", skills: [{name:"Hook Sizes", desc:"mm vs letter codes"}, {name:"Yarn Weights", desc:"Worsted vs DK"}] },
                            { id: "hk2", title: "Grip & Posture", skills: [{name:"Knife vs Pen Grip", desc:"Find comfort"}, {name:"Tension Control", desc:"Consistent loops"}] }
                        ],
                        middle: { id: "hk_mid", title: "Stitch Lab", skills: [{name:"The Chain", desc:"Foundation chains"}, {name:"Single Crochet", desc:"Insert, YO, pull"}, {name:"Double Crochet", desc:"The taller stitch"}] },
                        boss: { id: "hk_boss", title: "BOSS: Granny Square", skills: [{name:"Classic Square", desc:"3 rounds, corner clusters"}], isBoss: true }
                    },
                    tier2: {
                        branches: [
                            { id: "hk_ami", title: "Amigurumi", skills: [{name:"Magic Ring", desc:"Tight start"}, {name:"Invisible Decrease", desc:"No gaps"}] },
                            { id: "hk_tex", title: "Texture", skills: [{name:"Ribbing", desc:"Back loop only"}, {name:"Popcorn/Bobble", desc:"3D stitches"}] }
                        ]
                    }
                },
                rightTree: {
                    tier1: {
                        layout: 'converge',
                        roots: [
                            { id: "pt1", title: "Reading Patterns", skills: [{name:"Abbreviations", desc:"SC, DC, CH, SLST"}, {name:"Diagrams", desc:"Read symbols"}] },
                            { id: "pt2", title: "Finishing", skills: [{name:"Weaving Ends", desc:"Darning needle"}, {name:"Blocking", desc:"Steam or Wet block"}] }
                        ],
                        middle: { id: "pt_mid", title: "Color Work", skills: [{name:"Stripe Changes", desc:"Change on last pull"}, {name:"Carrying Yarn", desc:"Hide strand inside"}] },
                        boss: { id: "pt_boss", title: "BOSS: Beanie Hat", skills: [{name:"Simple Beanie", desc:"In the round, closing top"}], isBoss: true }
                    },
                    tier2: {
                        branches: [
                            { id: "pt_lace", title: "Lace Work", skills: [{name:"Pineapple Stitch", desc:"Complex motif"}, {name:"Blocking Lace", desc:"Pinning points"}] },
                            { id: "pt_tun", title: "Tunisian", skills: [{name:"Simple Stitch", desc:"Forward/Return pass"}, {name:"Honeycomb", desc:"Texture work"}] }
                        ]
                    }
                }
            }
        };

        let currentProjectKey = 'kitchen';
        let state = JSON.parse(localStorage.getItem('skillTree_v12')) || {};

        function save() { localStorage.setItem('skillTree_v12', JSON.stringify(state)); render(); }
        function resetData() { if(confirm("Reset progress for this project?")) { state = {}; save(); } }
        function toggle(key) { state[key] = !state[key]; save(); }
        function increment(key, max) { let val = state[key] || 0; if(val < max) state[key] = val + 1; save(); }

        function openGuide(title, htmlContent) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerHTML = htmlContent;
            const color = projectLibrary[currentProjectKey].colors.left;
            document.getElementById('modalTitle').style.color = color;
            document.querySelector('.modal-content').style.borderTopColor = color;
            document.getElementById('guideModal').style.display = 'flex';
        }
        function closeGuide(event) {
            if (event && event.target.id !== 'guideModal') return;
            document.getElementById('guideModal').style.display = 'none';
        }

        function isNodeComplete(node) {
            if(!node) return true;
            return node.skills.every(s => {
                const key = node.id + "_" + s.name;
                if(s.max) return (state[key] || 0) >= s.max;
                return state[key] === true;
            });
        }

        function isAnyBossDefeated(project) {
            let bossDefeated = false;
            if (project.leftTree.tier1.layout === 'parallel') {
                project.leftTree.tier1.paths.forEach(pathData => {
                    const bossNode = pathData.nodes[pathData.nodes.length - 1]; 
                    if (isNodeComplete(bossNode)) bossDefeated = true;
                });
            } else {
                if (isNodeComplete(project.leftTree.tier1.boss)) bossDefeated = true;
            }
            if (project.rightTree.tier1.layout === 'parallel') {
                project.rightTree.tier1.paths.forEach(pathData => {
                    const bossNode = pathData.nodes[pathData.nodes.length - 1];
                    if (isNodeComplete(bossNode)) bossDefeated = true;
                });
            } else {
                if (isNodeComplete(project.rightTree.tier1.boss)) bossDefeated = true;
            }
            return bossDefeated;
        }

        function switchProject() {
            currentProjectKey = document.getElementById('projectSelect').value;
            render();
            scrollToStart();
        }

        function render() {
            const project = projectLibrary[currentProjectKey];
            const container = document.getElementById('forest-container');
            container.innerHTML = ''; 

            document.documentElement.style.setProperty('--theme-left', project.colors.left);
            document.documentElement.style.setProperty('--theme-right', project.colors.right);

            const isTier2Open = isAnyBossDefeated(project);

            const leftCol = document.createElement('div');
            leftCol.className = 'tree-column';
            renderTier1(leftCol, project.leftTree.tier1, 'theme-left');
            renderTier2(leftCol, project.leftTree.tier2, 'theme-left', isTier2Open);
            if (project.leftTree.tier3) renderTier3(leftCol, project.leftTree.tier3, 'theme-left', project.leftTree.tier2);
            container.appendChild(leftCol);

            const rightCol = document.createElement('div');
            rightCol.className = 'tree-column';
            renderTier1(rightCol, project.rightTree.tier1, 'theme-right');
            renderTier2(rightCol, project.rightTree.tier2, 'theme-right', isTier2Open);
            container.appendChild(rightCol);
        }

        function renderTier1(container, data, theme) {
            const wrapper = document.createElement('div');
            
            if (data.layout === 'parallel') {
                const row = document.createElement('div');
                row.className = 'parallel-row';

                const collector = document.createElement('div');
                collector.className = 'parallel-collector';
                collector.innerHTML = `
                    <div class="center-stem-up"></div>
                    <div class="route-left"></div>
                    <div class="route-right"></div>
                    <div class="route-left-up"></div>
                    <div class="route-right-up"></div>
                `;

                data.paths.forEach((pathData, index) => {
                    const col = document.createElement('div');
                    col.className = 'parallel-col';
                    const pathTheme = pathData.theme || theme;
                    let prevDone = true;

                    pathData.nodes.forEach((node, nodeIdx) => {
                        const isLocked = !prevDone;
                        const card = createCard(node, pathTheme, isLocked);
                        if (nodeIdx > 0) card.classList.add('vertical-connect');

                        if (node.isBoss && isNodeComplete(node)) {
                            if (index === 0) collector.classList.add('active-left');
                            if (index === 1) collector.classList.add('active-center');
                            if (index === 2) collector.classList.add('active-right');
                        }

                        col.appendChild(card);
                        if (!isNodeComplete(node)) prevDone = false;
                    });
                    
                    const filler = document.createElement('div');
                    filler.className = 'col-filler-line';
                    const bossNode = pathData.nodes[pathData.nodes.length - 1];
                    if (isNodeComplete(bossNode)) {
                        if (index === 0) filler.classList.add('active-easy');
                        if (index === 1) filler.classList.add('active-med');
                        if (index === 2) filler.classList.add('active-hard');
                    }
                    col.appendChild(filler); 
                    row.appendChild(col);
                });
                
                wrapper.appendChild(collector);
                wrapper.appendChild(row);

            } else {
                const middleComplete = isNodeComplete(data.middle);
                const bossCard = createCard(data.boss, theme, !middleComplete);
                bossCard.classList.add('vertical-connect'); 
                wrapper.appendChild(bossCard);

                const rootsComplete = data.roots.every(r => isNodeComplete(r));
                const midCard = createCard(data.middle, theme, !rootsComplete);
                midCard.classList.add('tier1-mid-node');
                wrapper.appendChild(midCard);

                const row = document.createElement('div');
                row.className = 'foundation-row';
                const connector = document.createElement('div');
                connector.className = 'foundation-connector';
                row.appendChild(connector);

                data.roots.forEach(node => { row.appendChild(createCard(node, theme, false)); });
                wrapper.appendChild(row);
            }
            container.appendChild(wrapper);
        }

        function renderTier2(container, data, theme, isUnlocked) {
            const wrapper = document.createElement('div');
            wrapper.className = `tier-2-area ${isUnlocked ? 'unlocked' : ''}`;

            const bCont = document.createElement('div');
            bCont.className = 'branch-container';
            bCont.innerHTML = `<div class="branch-bar"></div>`;
            
            data.branches.forEach((b, index) => {
                const el = createCard(b, theme, !isUnlocked);
                const stem = document.createElement('div');
                stem.className = 'branch-stem';
                if(data.branches.length === 2) stem.style[index === 0 ? 'left' : 'right'] = '145px';
                bCont.appendChild(stem);
                bCont.appendChild(el);
            });

            wrapper.appendChild(bCont);
            container.appendChild(wrapper);
        }

        function renderTier3(container, data, theme, tier2Data) {
            const reqNode = tier2Data.branches.find(b => b.id === data.requires);
            const isUnlocked = reqNode && isNodeComplete(reqNode);

            const wrapper = document.createElement('div');
            wrapper.className = `tier-3-area ${isUnlocked ? 'unlocked' : ''}`;

            const collector = document.createElement('div');
            collector.className = 'tier3-collector';
            if (isUnlocked) collector.classList.add('active-t3');
            collector.innerHTML = `<div class="t3-route-up1"></div><div class="t3-route-across"></div><div class="t3-route-up2"></div>`;
            wrapper.appendChild(collector);

            const bCont = document.createElement('div');
            bCont.className = 'branch-container';
            bCont.innerHTML = `<div class="branch-bar"></div>`;
            
            data.branches.forEach((b, index) => {
                const el = createCard(b, theme, !isUnlocked);
                const stem = document.createElement('div');
                stem.className = 'branch-stem';
                if(data.branches.length === 2) stem.style[index === 0 ? 'left' : 'right'] = '145px';
                bCont.appendChild(stem);
                bCont.appendChild(el);
            });

            wrapper.appendChild(bCont);
            container.appendChild(wrapper);
        }

        function createCard(node, theme, isLocked) {
            const isGatewayOrBoss = node.isBoss || node.isGateway;
            const div = document.createElement('div');
            div.className = `node-card ${theme} ${isGatewayOrBoss ? 'gateway-card' : ''}`;
            
            if(isLocked) div.style.cssText = "opacity:0.5; pointer-events:none; filter:grayscale(100%)";
            else if (isGatewayOrBoss && isNodeComplete(node)) div.classList.add('unlocked-boss');

            const skillsHtml = node.skills.map(s => {
                const key = node.id + "_" + s.name;
                const val = state[key] || 0;

                let control = '';
                if(s.max && s.max > 1) {
                    const done = val >= s.max;
                    control = `<button class="counter-btn ${done?'done':''}" onclick="increment('${key}',${s.max})">${val}/${s.max}</button>`;
                } else {
                    const checked = val === true ? 'checked' : '';
                    control = `<input type="checkbox" ${checked} onchange="toggle('${key}')">`;
                }

                let guideHtml = '';
                if (s.instructions) {
                    const safeHTML = s.instructions.replace(/"/g, '&quot;').replace(/'/g, "\\'").replace(/(\r\n|\n|\r)/gm, "");
                    guideHtml = `<span class="guide-icon" onclick="openGuide('${s.name}', '${safeHTML}')">📖</span>`;
                }

                return `
                    <div class="skill-group">
                        <div class="skill-header">
                            <div class="skill-name-wrapper"><span class="skill-name">${s.name}</span>${guideHtml}</div>
                            ${control}
                        </div>
                        <span class="skill-desc">${s.desc}</span>
                    </div>
                `;
            }).join('');

            div.innerHTML = `<div class="title">${node.title}</div>${skillsHtml}`;
            return div;
        }

        // --- MOBILE UX SCRIPT ---
        function scrollToStart() {
            const vp = document.getElementById('viewport');
            // Scrolls to the bottom center of the tree on initial load so the user starts at the "roots"
            vp.scrollTop = vp.scrollHeight;
            vp.scrollLeft = (vp.scrollWidth - vp.clientWidth) / 2;
        }

        render();
        // Wait a tiny bit for render to finish, then center the viewport on the roots
        setTimeout(scrollToStart, 100);

    </script>
</body>
</html>
