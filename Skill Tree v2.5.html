<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111111">
    <title>Skill Tree App</title>
    
    <style>
        :root {
            --bg: #111;
            --card-bg: #1a1a1a;
            --text: #eee;
            --subtext: #888;
            
            --theme-left: #ff7043; 
            --theme-right: #f06292;
            
            --unlocked-accent: #00e676;
            --line-color: #555;
            --star-gold: #ffd700;
            
            --tree-scale: 1; 
        }

        /* --- STRICT APP LAYOUT --- */
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100dvh; 
            overflow: hidden; background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            display: flex; flex-direction: column;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- HEADER --- */
        .app-header {
            background: rgba(17, 17, 17, 0.95); backdrop-filter: blur(10px);
            padding: 15px 20px; text-align: center; z-index: 100;
            border-bottom: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); flex-shrink: 0;
        }
        select {
            background: #222; color: #fff; font-size: 1.1rem; padding: 8px 15px;
            border: 2px solid #444; border-radius: 8px; cursor: pointer; outline: none;
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold; width: 100%; max-width: 300px;
        }
        .subtitle { color: #888; margin: 8px 0 0 0; font-size: 0.8rem; }

        /* --- THE VIEWPORT (Infinite Canvas) --- */
        .tree-viewport { 
            flex: 1; width: 100%; position: relative; 
            overflow: hidden; 
            cursor: grab;
        }
        .tree-viewport:active { cursor: grabbing; }

        /* --- THE FOREST (The map element we pan and zoom) --- */
        .forest {
            display: flex; gap: 80px; align-items: flex-end; justify-content: center;
            position: absolute; 
            bottom: 50px; left: 50%; 
            width: max-content; 
            transform-origin: bottom center; 
        }

        /* --- BASE PILLARS (Horizontal Layout) --- */
        .parallel-row { display: flex; gap: 60px; align-items: flex-end; position: relative; }
        .parallel-col { display: flex; flex-direction: column-reverse; align-items: center; position: relative; gap: 30px;}

        /* --- LAYOUT: CONVERGE (Used by Crochet & New Skills) --- */
        .tree-column { display: flex; flex-direction: column-reverse; align-items: center; position: relative; }
        .tier1-mid-node { margin-bottom: 10px; position: relative; }
        .tier1-mid-node::before { content: ''; position: absolute; bottom: -42px; left: 50%; transform: translateX(-50%); width: 4px; height: 42px; background: var(--line-color); z-index: 0; }
        .foundation-row { display: flex; gap: 30px; position: relative; justify-content: center; margin-bottom: 30px;}
        .foundation-connector { position: absolute; top: -20px; left: 130px; right: 130px; height: 4px; background: var(--line-color); z-index: 0; }
        .foundation-row .node-card::before { content: ''; position: absolute; top: -22px; left: 50%; transform: translateX(-50%); width: 4px; height: 22px; background: var(--line-color); }

        /* --- NATIVE FLEXBOX BRANCHING ENGINE --- */
        .branch-row { 
            display: flex; gap: 30px; position: relative; margin-bottom: 30px; 
        }
        .branch-col { 
            position: relative; display: flex; flex-direction: column-reverse; align-items: center; gap: 30px;
        }
        .branch-col::after { 
            content: ''; position: absolute; bottom: -30px; height: 4px; background: var(--line-color); transition: 0.3s; z-index: 0; 
        }
        .branch-col:first-child::after { left: 50%; width: 50%; }
        .branch-col:last-child::after { right: 50%; width: 50%; }
        .branch-col:not(:first-child):not(:last-child)::after { left: 0; width: 100%; }
        .branch-col:first-child:last-child::after { display: none; } 
        
        .branch-col::before { 
            content: ''; position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); 
            width: 4px; height: 30px; background: var(--line-color); transition: 0.3s; z-index: 0; 
        }

        /* Umbrella GLOW LOGIC */
        .branch-row.theme-easy.unlocked-branches > .branch-col::before, .branch-row.theme-easy.unlocked-branches > .branch-col::after { background: #00e676; box-shadow: 0 0 10px #00e676; z-index: 1;}
        .branch-row.theme-med.unlocked-branches > .branch-col::before, .branch-row.theme-med.unlocked-branches > .branch-col::after { background: #ffb300; box-shadow: 0 0 10px #ffb300; z-index: 1;}
        .branch-row.theme-hard.unlocked-branches > .branch-col::before, .branch-row.theme-hard.unlocked-branches > .branch-col::after { background: #ff5252; box-shadow: 0 0 10px #ff5252; z-index: 1;}
        .branch-row.theme-right.unlocked-branches > .branch-col::before, .branch-row.theme-right.unlocked-branches > .branch-col::after { background: var(--theme-right); box-shadow: 0 0 10px var(--theme-right); z-index: 1;}
        .branch-row.theme-left.unlocked-branches > .branch-col::before, .branch-row.theme-left.unlocked-branches > .branch-col::after { background: var(--theme-left); box-shadow: 0 0 10px var(--theme-left); z-index: 1;}
        
        /* --- CARDS --- */
        .node-card {
            background: var(--card-bg); width: 250px; padding: 15px; border-radius: 8px; 
            border: 1px solid #333; position: relative; z-index: 2; transition: transform 0.2s ease;
            cursor: default; flex-shrink: 0; margin: 0;
        }
        .node-card:active { transform: scale(0.98); }
        .boss-card, .gateway-card { border-width: 2px !important; }
        .stacked-node { margin-bottom: 30px; }

        .theme-left { border-color: var(--theme-left); box-shadow: 0 4px 0 var(--theme-left); }
        .theme-left .title { color: var(--theme-left); }
        .theme-right { border-color: var(--theme-right); box-shadow: 0 4px 0 var(--theme-right); }
        .theme-right .title { color: var(--theme-right); }

        .theme-easy { border-color: #00e676; box-shadow: 0 4px 0 #00b25c; }
        .theme-easy .title { color: #00e676; }
        .theme-med { border-color: #ffb300; box-shadow: 0 4px 0 #c68c00; }
        .theme-med .title { color: #ffb300; }
        .theme-hard { border-color: #ff5252; box-shadow: 0 4px 0 #c8102e; }
        .theme-hard .title { color: #ff5252; }

        .title { font-weight: bold; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 15px; text-align: center; }

        /* --- BOSS PULSING & ENERGY LINES --- */
        .unlocked-boss.theme-easy { animation: pulse-easy 2s infinite; }
        .unlocked-boss.theme-med { animation: pulse-med 2s infinite; }
        .unlocked-boss.theme-hard { animation: pulse-hard 2s infinite; }
        .unlocked-boss.theme-right { animation: pulse-right 2s infinite; }
        .unlocked-boss.theme-left { animation: pulse-left 2s infinite; }

        @keyframes pulse-easy { 0% { box-shadow: 0 0 5px rgba(0,230,118,0.2); } 50% { box-shadow: 0 0 20px rgba(0,230,118,0.7); } 100% { box-shadow: 0 0 5px rgba(0,230,118,0.2); } }
        @keyframes pulse-med { 0% { box-shadow: 0 0 5px rgba(255,179,0,0.2); } 50% { box-shadow: 0 0 20px rgba(255,179,0,0.7); } 100% { box-shadow: 0 0 5px rgba(255,179,0,0.2); } }
        @keyframes pulse-hard { 0% { box-shadow: 0 0 5px rgba(255,82,82,0.2); } 50% { box-shadow: 0 0 20px rgba(255,82,82,0.7); } 100% { box-shadow: 0 0 5px rgba(255,82,82,0.2); } }
        @keyframes pulse-right { 0% { box-shadow: 0 0 5px rgba(240,98,146,0.2); } 50% { box-shadow: 0 0 20px rgba(240,98,146,0.7); } 100% { box-shadow: 0 0 5px rgba(240,98,146,0.2); } }
        @keyframes pulse-left { 0% { box-shadow: 0 0 5px rgba(255,112,67,0.2); } 50% { box-shadow: 0 0 20px rgba(255,112,67,0.7); } 100% { box-shadow: 0 0 5px rgba(255,112,67,0.2); } }

        .shoots-energy-up::before { content: ''; position: absolute; width: 4px; left: 50%; transform: translateX(-50%); bottom: 100%; height: 30px; z-index: 1; animation: grow-up 0.3s ease-out; }
        @keyframes grow-up { from { height: 0; } to { height: 30px; } }
        .theme-easy.shoots-energy-up::before { background: #00e676; box-shadow: 0 0 10px #00e676; }
        .theme-med.shoots-energy-up::before { background: #ffb300; box-shadow: 0 0 10px #ffb300; }
        .theme-hard.shoots-energy-up::before { background: #ff5252; box-shadow: 0 0 10px #ff5252; }
        .theme-left.shoots-energy-up::before { background: var(--theme-left); box-shadow: 0 0 10px var(--theme-left); }
        .theme-right.shoots-energy-up::before { background: var(--theme-right); box-shadow: 0 0 10px var(--theme-right); }
        
        .node-card.vertical-connect::after { content: ''; position: absolute; width: 4px; height: 30px; background: var(--line-color); left: 50%; transform: translateX(-50%); bottom: -30px; z-index: -2; }

        /* --- INPUTS & ICONS --- */
        .skill-group { margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .skill-group:last-child { border-bottom: none; }
        .skill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .skill-name-wrapper { display: flex; align-items: center; gap: 8px; }
        .skill-name { font-weight: bold; color: #ccc; font-size: 0.85rem; }
        
        .guide-icon { cursor: pointer; font-size: 1.1rem; filter: grayscale(100%); padding: 5px; margin: -5px; transition: all 0.2s; }
        .guide-icon:active { transform: scale(1.2); filter: grayscale(0%); }
        
        .task-rating-display { font-size: 0.8rem; margin-top: -2px; margin-bottom: 4px; letter-spacing: 1px; }
        .star-filled { color: var(--star-gold); text-shadow: 0 0 5px rgba(255, 215, 0, 0.3); }
        .star-empty { color: #333; }

        .skill-desc { font-size: 0.7rem; color: var(--subtext); line-height: 1.3; font-style: italic; display: block; padding-left: 2px;}

        .skill-header input { accent-color: var(--unlocked-accent); cursor: pointer; width: 20px; height: 20px; }
        .counter-btn { background: #333; color: #fff; border: 1px solid #555; padding: 4px 10px; border-radius:6px; cursor: pointer; font-size: 0.8rem; font-weight:bold; }
        .counter-btn.done { background: var(--unlocked-accent); border-color: var(--unlocked-accent); color: #000; }

        /* --- FLOATING UI CONTROLS --- */
        .floating-controls {
            position: fixed; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100;
        }
        .btn-ui {
            background: rgba(0,0,0,0.8); color: #888; border: 2px solid #333; border-radius: 50%; 
            width: 45px; height: 45px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 1.5rem; backdrop-filter: blur(5px); font-weight: bold; transition: all 0.2s;
        }
        .btn-ui:active { transform: scale(0.9); color: #fff; border-color: var(--theme-left); }
        .reset-btn-container { position: fixed; bottom: 20px; right: 20px; z-index: 100; }

        /* --- MODALS --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: flex-end;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #222; border-top: 4px solid var(--theme-left); border-radius: 20px 20px 0 0;
            padding: 30px; width: 100%; max-height: 80vh; overflow-y: auto; color: #eee;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5); position: relative; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-title { font-size: 1.4rem; margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; text-transform: uppercase;}
        .modal-body { line-height: 1.6; font-size: 0.95rem; color: #ccc; padding-bottom: 20px;}
        .modal-body ol { padding-left: 20px; }
        .modal-body li { margin-bottom: 12px; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #888; }

        #ratingModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; }
        #ratingModal .modal-content {
            position: fixed; background: #222; border: 2px solid var(--theme-left); 
            border-radius: 12px; padding: 15px 20px; width: 250px; color: #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); animation: popIn 0.2s ease-out;
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 8px; margin-top: 10px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 2.5rem; color: #444; cursor: pointer; transition: 0.2s ease; }
        .star-rating label:hover, .star-rating label:hover ~ label { color: var(--star-gold); text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); transform: scale(1.1); }
        .rating-prompt { text-align: center; margin-bottom: 5px; font-size: 0.9rem; color: #aaa;}

    </style>
</head>
<body>

    <div class="app-header">
        <select id="projectSelect" onchange="switchProject()">
            <option value="kitchen">🔪 Kitchen RPG</option>
            <option value="crochet">🧶 Yarn Mastery</option>
            <option value="cocktails">🍸 Mixology</option>
            <option value="mechanics">🔧 Auto Repair</option>
            <option value="running">🏃 Couch to 5K</option>
            <option value="photography">📷 Photography</option>
            <option value="calligraphy">🖋️ Calligraphy</option>
        </select>
        <p class="subtitle">Complete tasks and rate your work!</p>
    </div>

    <div class="tree-viewport" id="viewport">
        <div class="forest" id="forest-container">
            </div>
    </div>

    <div class="floating-controls">
        <button class="btn-ui" onclick="changeZoom(0.15)" title="Zoom In">+</button>
        <button class="btn-ui" onclick="changeZoom(-0.15)" title="Zoom Out">−</button>
        <button class="btn-ui" onclick="centerCamera()" title="Recenter View" style="font-size: 1rem;">🎯</button>
    </div>
    <div class="reset-btn-container">
        <button class="btn-ui" onclick="resetData()" title="Reset Progress">↻</button>
    </div>

    <div class="modal-overlay" id="guideModal" onclick="closeModal('guideModal', event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal('guideModal')">&times;</span>
            <h2 class="modal-title" id="modalTitle">Skill Guide</h2>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div class="modal-overlay" id="ratingModal" onclick="cancelRating(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="ratingTitle" style="text-align: center; margin: 0 0 5px 0; font-size: 1.1rem; border:none; text-transform: uppercase;">Task Complete!</h2>
            <p class="rating-prompt">Rate your execution:</p>
            <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5" onclick="submitRating(5)"><label for="star5" title="Flawless">★</label>
                <input type="radio" id="star4" name="rating" value="4" onclick="submitRating(4)"><label for="star4" title="Great">★</label>
                <input type="radio" id="star3" name="rating" value="3" onclick="submitRating(3)"><label for="star3" title="Good">★</label>
                <input type="radio" id="star2" name="rating" value="2" onclick="submitRating(2)"><label for="star2" title="Needs Practice">★</label>
                <input type="radio" id="star1" name="rating" value="1" onclick="submitRating(1)"><label for="star1" title="Burnt it">★</label>
            </div>
        </div>
    </div>

        let currentProjectKey = 'kitchen';
        let state = JSON.parse(localStorage.getItem('skillTree_v36')) || {};
        let pendingTask = null;

        // PAN AND ZOOM VARIABLES
        let currentZoom = 0.8;
        let panX = 0;
        let panY = 0;

        function save() { localStorage.setItem('skillTree_v36', JSON.stringify(state)); render(); }
        
        function resetData() { 
            if(confirm("Reset progress for this project?")) { state = {}; save(); } 
        }

        // --- THE INFINITE CANVAS ENGINE ---
        function updateTransform(smooth = false) {
            const forest = document.getElementById('forest-container');
            if (smooth) forest.style.transition = 'transform 0.25s cubic-bezier(0.25, 1, 0.5, 1)';
            else forest.style.transition = 'none';
            forest.style.transform = `translateX(calc(-50% + ${panX}px)) translateY(${panY}px) scale(${currentZoom})`;
        }

        function changeZoom(amount) {
            currentZoom += amount;
            if (currentZoom < 0.2) currentZoom = 0.2;
            if (currentZoom > 2) currentZoom = 2;
            updateTransform(true);
        }

        function centerCamera() {
            panX = 0; panY = 0; 
            currentZoom = currentProjectKey === 'kitchen' ? 0.75 : 0.85; // Kitchen is wider
            updateTransform(true);
        }

        function attemptToggle(key, event) {
            if (!state[key]) {
                pendingTask = { type: 'checkbox', key: key };
                openRatingModal(event);
            } else {
                state[key] = false;
                delete state[key + "_rating"]; 
                save();
            }
        }

        function attemptIncrement(key, max, event) {
            let val = state[key] || 0;
            if (val < max - 1) {
                state[key] = val + 1;
                save();
            } else if (val === max - 1) {
                pendingTask = { type: 'counter', key: key, max: max };
                openRatingModal(event);
            }
        }

        function openRatingModal(event) {
            document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);
            const color = projectLibrary[currentProjectKey].colors.left;
            document.getElementById('ratingTitle').style.color = color;
            
            const modal = document.getElementById('ratingModal');
            const popup = modal.querySelector('.modal-content');
            popup.style.borderColor = color;
            modal.style.display = 'block'; 

            const rect = event.currentTarget.getBoundingClientRect();
            const popupHeight = 150; 
            const popupWidth = 290; 
            
            let topPos = rect.top - popupHeight - 15; 
            if (topPos < 10) topPos = rect.bottom + 15;
            
            let leftPos = rect.left + (rect.width / 2) - (popupWidth / 2);
            if (leftPos < 10) leftPos = 10;
            if (leftPos > window.innerWidth - popupWidth - 10) leftPos = window.innerWidth - popupWidth - 10;
            
            popup.style.top = `${topPos}px`;
            popup.style.left = `${leftPos}px`;
        }

        function submitRating(stars) {
            state[pendingTask.key + "_rating"] = stars;
            if (pendingTask.type === 'checkbox') state[pendingTask.key] = true;
            else if (pendingTask.type === 'counter') state[pendingTask.key] = pendingTask.max;
            
            pendingTask = null; 
            closeModal('ratingModal');
            save(); 
        }

        function cancelRating(event) {
            if (event && event.target.id !== 'ratingModal') return;
            pendingTask = null;
            closeModal('ratingModal');
            render(); 
        }

        function openGuide(title, htmlContent) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerHTML = htmlContent;
            const color = projectLibrary[currentProjectKey].colors.left;
            document.getElementById('modalTitle').style.color = color;
            document.querySelector('#guideModal .modal-content').style.borderTopColor = color;
            document.getElementById('guideModal').style.display = 'flex';
        }

        function closeModal(modalId, event) {
            if (event && event.target.id !== modalId) return;
            document.getElementById(modalId).style.display = 'none';
        }

        function isNodeComplete(node) {
            if(!node) return true;
            return node.skills.every(s => {
                const key = node.id + "_" + s.name;
                if(s.max) return (state[key] || 0) >= s.max;
                return state[key] === true;
            });
        }

        function switchProject() {
            currentProjectKey = document.getElementById('projectSelect').value;
            centerCamera(); 
            render();
        }

        // --- REFACTORED MODULAR RENDER ENGINE ---
        function render() {
            const project = projectLibrary[currentProjectKey];
            const container = document.getElementById('forest-container');
            container.innerHTML = ''; 

            document.documentElement.style.setProperty('--theme-left', project.colors.left);
            if (project.colors.right) document.documentElement.style.setProperty('--theme-right', project.colors.right);

            if (project.leftTree) renderTreeColumn(container, project.leftTree, 'theme-left');
            if (project.rightTree) renderTreeColumn(container, project.rightTree, 'theme-right');
        }

        function renderTreeColumn(container, treeData, theme) {
            // Kitchen RPG Layout
            if (treeData.tier1.layout === 'parallel') {
                const pRow = document.createElement('div');
                pRow.className = 'parallel-row';

                treeData.tier1.paths.forEach((pathData) => {
                    const col = document.createElement('div');
                    col.className = 'parallel-col';
                    const pathTheme = pathData.theme || theme;
                    let prevDone = true;

                    pathData.nodes.forEach((node, nodeIdx) => {
                        const isLocked = !prevDone;
                        const card = createCard(node, pathTheme, isLocked);
                        if (nodeIdx > 0) card.classList.add('vertical-connect');

                        if (isNodeComplete(node) && nodeIdx < pathData.nodes.length - 1) {
                            card.classList.add('shoots-energy-up');
                        }
                        col.appendChild(card);
                        if (!isNodeComplete(node)) prevDone = false;
                    });
                    
                    if (pathData.branches) {
                        const bossNode = pathData.nodes[pathData.nodes.length - 1];
                        const isUnlocked = isNodeComplete(bossNode);
                        if (isUnlocked) col.lastChild.classList.add('shoots-energy-up'); 
                        
                        const branchTree = renderBranchesRecursively(pathData.branches, pathTheme, isUnlocked);
                        col.appendChild(branchTree);
                    }
                    pRow.appendChild(col);
                });
                container.appendChild(pRow);
            } 
            // All other projects layout
            else if (treeData.tier1.layout === 'converge') {
                const col = document.createElement('div');
                col.className = 'tree-column';
                
                const bossNode = treeData.tier1.boss;
                const middleComplete = isNodeComplete(treeData.tier1.middle);
                const bossCard = createCard(bossNode, theme, !middleComplete);
                bossCard.classList.add('vertical-connect'); 
                col.appendChild(bossCard);

                const rootsComplete = treeData.tier1.roots.every(r => isNodeComplete(r));
                const midCard = createCard(treeData.tier1.middle, theme, !rootsComplete);
                midCard.classList.add('tier1-mid-node');
                if (rootsComplete) midCard.classList.add('shoots-energy-up');
                col.appendChild(midCard);

                const row = document.createElement('div');
                row.className = 'foundation-row';
                const connector = document.createElement('div');
                connector.className = 'foundation-connector';
                row.appendChild(connector);

                treeData.tier1.roots.forEach(node => { row.appendChild(createCard(node, theme, false)); });
                col.appendChild(row);
                
                // Render branches off the boss node
                if (treeData.tier2) {
                    const isUnlocked = isNodeComplete(bossNode);
                    if (isUnlocked) bossCard.classList.add('shoots-energy-up');
                    
                    const branchTree = renderBranchesRecursively(treeData.tier2.branches, theme, isUnlocked);
                    col.appendChild(branchTree);
                }
                
                container.appendChild(col);
            }
        }

        // Flexbox Sub-Branch Builder
        function renderBranchesRecursively(branches, theme, isParentUnlocked) {
            const row = document.createElement('div');
            row.className = `branch-row ${theme} ${isParentUnlocked ? 'unlocked-branches' : ''}`;
            
            branches.forEach(b => {
                const col = document.createElement('div');
                col.className = 'branch-col';
                
                const card = createCard(b, b.theme || theme, !isParentUnlocked);
                col.appendChild(card);
                
                if (b.subBranches) {
                    const isUnlocked = isParentUnlocked && isNodeComplete(b);
                    if (isUnlocked) card.classList.add('shoots-energy-up');
                    
                    const subRow = renderBranchesRecursively(b.subBranches, b.theme || theme, isUnlocked);
                    col.appendChild(subRow);
                }
                
                row.appendChild(col);
            });
            return row;
        }

        function createCard(node, theme, isLocked) {
            const isGatewayOrBoss = node.isBoss || node.isGateway;
            const cardTheme = node.theme || theme; 
            
            const div = document.createElement('div');
            div.className = `node-card ${cardTheme} ${isGatewayOrBoss ? 'gateway-card' : ''}`;
            
            if(isLocked) div.style.cssText = "opacity:0.5; pointer-events:none; filter:grayscale(100%)";
            else if (isGatewayOrBoss && isNodeComplete(node)) div.classList.add('unlocked-boss');

            const skillsHtml = node.skills.map(s => {
                const key = node.id + "_" + s.name;
                const val = state[key] || 0;
                const ratingVal = state[key + "_rating"]; 

                let control = '';
                if(s.max && s.max > 1) {
                    const done = val >= s.max;
                    control = `<button class="counter-btn ${done?'done':''}" onclick="attemptIncrement('${key}',${s.max}, event)">${val}/${s.max}</button>`;
                } else {
                    const checked = val === true ? 'checked' : '';
                    control = `<input type="checkbox" ${checked} onchange="attemptToggle('${key}', event)">`;
                }

                let guideHtml = '';
                if (s.instructions) {
                    const safeHTML = s.instructions.replace(/"/g, '&quot;').replace(/'/g, "\\'").replace(/(\r\n|\n|\r)/gm, "");
                    guideHtml = `<span class="guide-icon" onclick="openGuide('${s.name}', '${safeHTML}')">📖</span>`;
                }
                
                let ratingHtml = '';
                if (ratingVal) {
                    let starsStr = '';
                    for (let i = 1; i <= 5; i++) {
                        starsStr += (i <= ratingVal) ? `<span class="star-filled">★</span>` : `<span class="star-empty">★</span>`;
                    }
                    ratingHtml = `<div class="task-rating-display">${starsStr}</div>`;
                }

                return `
                    <div class="skill-group">
                        <div class="skill-header">
                            <div class="skill-name-wrapper"><span class="skill-name">${s.name}</span>${guideHtml}</div>
                            ${control}
                        </div>
                        ${ratingHtml}
                        <span class="skill-desc">${s.desc}</span>
                    </div>
                `;
            }).join('');

            div.innerHTML = `<div class="title">${node.title}</div>${skillsHtml}`;
            return div;
        }

        // --- INFINITE CANVAS DRAG & DROP ENGINE ---
        const viewport = document.getElementById('viewport');
        let isDragging = false; 
        let startX, startY; 

        viewport.addEventListener('mousedown', (e) => {
            if(e.target.closest('.node-card') || e.target.closest('.modal-content') || e.target.closest('.floating-controls')) return;
            isDragging = true; 
            viewport.style.cursor = 'grabbing';
            closeModal('ratingModal');
            
            startX = e.clientX - panX; 
            startY = e.clientY - panY;
        });

        window.addEventListener('mouseup', () => { 
            isDragging = false; 
            viewport.style.cursor = 'grab'; 
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return; 
            e.preventDefault();
            panX = e.clientX - startX; 
            panY = e.clientY - startY; 
            updateTransform(false);
        });

        // Touch Support
        viewport.addEventListener('touchstart', (e) => {
            if(e.target.closest('.node-card') || e.target.closest('.modal-content') || e.target.closest('.floating-controls')) return;
            if(e.touches.length === 1) {
                isDragging = true;
                closeModal('ratingModal');
                startX = e.touches[0].clientX - panX;
                startY = e.touches[0].clientY - panY;
            }
        }, {passive: false});

        window.addEventListener('touchend', () => { isDragging = false; });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging || e.touches.length !== 1) return;
            if(!e.target.closest('.modal-content')) e.preventDefault(); 
            panX = e.touches[0].clientX - startX;
            panY = e.touches[0].clientY - startY;
            updateTransform(false);
        }, {passive: false});

        // Init
        centerCamera();
        render();

    </script>
</body>
</html>
